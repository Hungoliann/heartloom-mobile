services:
  - type: web
    name: heartloom-server
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
